<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Monitor Multipaciente</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
        padding-top: 2rem;
        transition: margin-left 0.3s;
        margin-left: 220px;
      }
      .sensor-card {
        min-width: 280px;
        margin-bottom: 1.5rem;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease-in-out;
      }
      .sensor-card.alerta-activa {
        border: 3px solid red !important;
        box-shadow: 0 0 15px red;
      }
      .sensor-value {
        font-size: 1.3rem;
        font-weight: bold;
      }
      .label {
        font-size: 0.85rem;
        color: #6c757d;
      }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: 200px;
        background-color: #343a40;
        padding-top: 3rem;
        color: white;
        transition: transform 0.3s ease-in-out;
        z-index: 1000;
      }
      .sidebar.hidden {
        transform: translateX(-100%);
      }
      .sidebar h5 {
        text-align: center;
        color: #f8f9fa;
      }
      .sidebar a {
        display: block;
        padding: 10px 20px;
        color: white;
        text-decoration: none;
      }
      .sidebar a:hover {
        background-color: #495057;
      }
      #menu-toggle {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 1100;
        background-color: #343a40;
        color: white;
        border: none;
        font-size: 1.5rem;
        padding: 5px 10px;
        border-radius: 4px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <button id="menu-toggle">☰</button>

    <div class="sidebar" id="sidebar">
      <h5>Menú</h5>
      <a href="#">🧍‍♂️ Pacientes</a>
      <a href="#">🖥️ Equipos</a>
      <a href="#">🧪 Sensores</a>
      <a href="#">🚨 Alarmas</a>
    </div>

    <div class="container">
      <h3 class="text-center mb-4">Monitor Multipaciente en Tiempo Real</h3>
      <div class="row" id="contenedor-pacientes"></div>
    </div>

    <script>
      // --- Toggle sidebar ---
      const toggleButton = document.getElementById("menu-toggle");
      const sidebar = document.getElementById("sidebar");
      toggleButton.addEventListener("click", () => {
        sidebar.classList.toggle("hidden");
        document.body.style.marginLeft = sidebar.classList.contains("hidden")
          ? "0"
          : "220px";
      });

      // --- Mapa UID -> nombre paciente ---
      const equipoToPaciente = {};

      async function getNombrePacientePorUid(uid_equipo) {
        if (equipoToPaciente[uid_equipo] !== undefined)
          return equipoToPaciente[uid_equipo];
        try {
          // FastAPI está corriendo en localhost:8000 tengan cuidado si cambian de puerto de fastapi
          //o el puerto esta ocupado con otro servicio corriendo
          const resp = await fetch(
            `http://localhost:8000/pacientes_por_dispositivo_uid/${uid_equipo}`,
          );
          const paciente = await resp.json();
          if (paciente && paciente.nombre && paciente.apellido) {
            const nombreCompleto = paciente.nombre + " " + paciente.apellido;
            equipoToPaciente[uid_equipo] = nombreCompleto;
            return nombreCompleto;
          } else {
            // Guardar el UID si no hay paciente asociado
            equipoToPaciente[uid_equipo] =
              `Equipo: ${uid_equipo} (Sin Paciente)`;
            return equipoToPaciente[uid_equipo];
          }
        } catch {
          equipoToPaciente[uid_equipo] =
            `Equipo: ${uid_equipo} (Error/No Asociado)`;
          return equipoToPaciente[uid_equipo];
        }
      }

      // --- Crear tarjeta paciente ---
      function crearTarjetaPaciente(uid, nombrePaciente) {
        const contenedor = document.getElementById("contenedor-pacientes");
        const col = document.createElement("div");
        col.className = "col-md-4";
        col.innerHTML = `
          <div class="card sensor-card" id="card-${uid}">
            <div class="card-body">
              <h5 class="card-title text-center" id="titulo-paciente-${uid}">
                ${nombrePaciente}
              </h5>
              <p class="label">SpO₂</p>
              <p id="spo2-${uid}" class="sensor-value text-primary">-- %</p>
              <p class="label">Pulso</p>
              <p id="pulso-${uid}" class="sensor-value text-danger">-- bpm</p>
              <p class="label">Presión Arterial</p>
              <p id="pni-${uid}" class="sensor-value text-success">-- / -- mmHg</p>
              <p class="label">Temperatura de piel</p>
              <p id="temperatura-${uid}" class="sensor-value text-warning">-- °C</p>
              <hr>
              <small class="text-muted" id="last-update-${uid}">Esperando datos...</small>
              <button class="btn btn-info btn-sm mt-3 w-100" data-uid="${uid}">
                Consultar Monitor
              </button>
            </div>
          </div>`;
        contenedor.appendChild(col);

        const consultarBtn = col.querySelector(`button[data-uid="${uid}"]`);
        if (consultarBtn) {
          consultarBtn.addEventListener("click", () => {
            // Mantiene el vínculo a la página monitor.html ( o a la q no slleva el boton consultar de cada tarjeta xq voy probando diferentes versiones y librerias en esta caso no uso chartjs , uso otra q se llama uplot xq es mas fluido, pensado para cuando tengamos miles de dispositivos)
            window.location.href = `monitorU1.html?uid=${uid}`;
          });
        }
      }

      function actualizarCampo(uid, campo, valor) {
        const el = document.getElementById(`${campo}-${uid}`);
        if (el) el.textContent = valor;
      }

      function actualizarTituloTarjetaPaciente(uid, nombrePaciente) {
        const titulo = document.getElementById(`titulo-paciente-${uid}`);
        if (titulo && titulo.textContent !== nombrePaciente) {
          titulo.textContent = nombrePaciente;
        }
      }

      // --- WebSocket conexión a la API ---

      const ws = new WebSocket("ws://localhost:8000/ws/datos");

      ws.onopen = () => console.log("✅ Conectado al WebSocket de la API");
      ws.onclose = () => console.log("❌ Desconectado del WebSocket");

      ws.onmessage = async (event) => {
        try {
          // El mensaje de la API es: {"sensor": "tipo", "payload": {...}}
          const rawData = JSON.parse(event.data);
          const { sensor, payload } = rawData;

          // Extraer el UID del payload (viene como Uid_Equipo)
          const uid = payload.Uid_Equipo;

          if (!uid) {
            console.warn("Dato WebSocket recibido sin Uid_Equipo:", rawData);
            return;
          }

          const timestamp = new Date().toLocaleTimeString();
          let nombrePaciente = await getNombrePacientePorUid(uid);

          // 1. Crear o actualizar la tarjeta
          if (!document.getElementById(`card-${uid}`)) {
            crearTarjetaPaciente(uid, nombrePaciente);
          } else if (nombrePaciente) {
            actualizarTituloTarjetaPaciente(uid, nombrePaciente);
          }

          // 2. Actualizar valores de los sensores
          if (sensor === "spo2") {
            actualizarCampo(uid, "spo2", `${payload.value ?? "--"} %`);
            // La frecuencia cardíaca (Pulso) a menudo viene con SpO2
            // Revisamos campos comunes: 'pulso', 'Pr'
            const pulso = payload.pulso || payload.Pr || "--";
            actualizarCampo(uid, "pulso", `${pulso} bpm`);
          } else if (sensor === "pni") {
            // PNI tiene el valor como "sistolica/diastolica" en 'value'
            const val = payload.value ? payload.value.split("/") : ["--", "--"];
            actualizarCampo(uid, "pni", `${val[0]}/${val[1]} mmHg`);
          } else if (sensor === "temp" || sensor === "temperatura_piel") {
            // Se puede recibir como 'temp' o 'temperatura_piel'
            actualizarCampo(uid, "temperatura", `${payload.value ?? "--"} °C`);
          } else if (sensor === "pulso" && payload.value !== undefined) {
            // Si el pulso viene como sensor individual aca con carlos estabamos viendo si lo envia el al pulso o usando alguna libreria obtener el puslso hasta el momento calcula mal el pulso al dia de la fecha año 2026
            actualizarCampo(uid, "pulso", `${payload.value} bpm`);
          }

          actualizarCampo(uid, "last-update", `Actualizado: ${timestamp}`);

          // 3. Consultar y manejar alertas
          try {
            const resPaciente = await fetch(
              `http://localhost:8000/pacientes_por_dispositivo_uid/${uid}`,
            );
            if (!resPaciente.ok) return;
            const paciente = await resPaciente.json();

            // Intentar resolver automáticamente las alertas si se cumplen los rangos tengo q ver esto en la api como hacerlo.

            await fetch(
              `http://localhost:8000/alertas/resolver_si_corresponde/${paciente.id_paciente}`,
              { method: "POST" },
            );

            // Consultar alertas activas
            // todo el tema de alertas se esta investigando como todo jaajaja
            const res = await fetch(
              `http://localhost:8000/alertas/${paciente.id_paciente}?estado=ACTIVA`,
            );
            const alertas = await res.json();
            const card = document.getElementById(`card-${uid}`);

            if (alertas.length > 0) {
              card.classList.add("alerta-activa");
            } else {
              card.classList.remove("alerta-activa");
            }
          } catch (err) {
            console.error("Error consultando alertas (API REST):", err);
            // Quitar la alerta si hay un error en la comunicación de alertas.
            const card = document.getElementById(`card-${uid}`);
            if (card) card.classList.remove("alerta-activa");
          }
        } catch (e) {
          console.error(
            "Error al procesar el mensaje WebSocket:",
            e,
            event.data,
          );
        }
      };
    </script>
  </body>
</html>
